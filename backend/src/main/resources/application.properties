# --- General Project Info ---
spring.application.name=PathSudhaar
server.port=8081

# --- MongoDB Configuration ---
# This connects to your local MongoDB service and creates the 'pathsudhaar' database
spring.mongodb.uri=mongodb://localhost:27017/pathsudhaar
# Ensures the @Indexed(unique = true) on your Admin username works
spring.data.mongodb.auto-index-creation=true

# --- File Upload Settings ---
# Essential for handling those base64 screenshot strings from the mobile app
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# --- Server Limits ---
# Prevents the "Connection Reset" error when uploading larger images
server.tomcat.max-swallow-size=15MB
server.tomcat.max-http-form-post-size=15MB

# --- Logging ---
logging.file.name=logs/path-sudhaar.log
# Optional: Set this to DEBUG if you want to see the MongoDB queries in the console
# logging.level.org.springframework.data.mongodb=DEBUG