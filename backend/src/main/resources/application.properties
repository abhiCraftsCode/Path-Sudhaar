spring.application.name=PathSudhaar
server.port=8081

# 1. Permanent File-based Database
spring.datasource.url=jdbc:h2:file:./data/pathsudhaar_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 2. Table Management
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. H2 Console (Accessible at http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. Logging
logging.file.name=logs/path-sudhaar.log